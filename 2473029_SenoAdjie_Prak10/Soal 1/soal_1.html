<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>

    <script src="jquery.js"></script>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
        }

        .container {
            border: 1px solid black;
            padding: 15px;
            box-shadow: 4px 4px 8px #888;
            display: inline-block;
        }

        .form-box {
            border: 1px solid black;
            padding: 10px;
            width: fit-content;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 4px 8px;
            text-align: left;
        }

        th {
            background-color: #000;
            color: #FFF;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3 style="margin-top: 0;">Selamat! Berikut adalah Daftar Mahasiswa yang mendapat Nilai A Pemograman Web SI
            Tahun Ajaran 2023/2024</h3>

        <div class="form-box">
            <label><input type="radio" name="kelas" value="all" checked> All</label><br>
            <label><input type="radio" name="kelas" value="A"> Kelas A</label><br>
            <label><input type="radio" name="kelas" value="B"> Kelas B</label><br>
            <button id="btnSearch" style="margin-top: 8px;">Search</button>
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>NRP</th>
                    <th>NAMA</th>
                    <th>KELAS</th>
                    <th>NILAI AKHIR</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>

        <script>
            $(document).ready(function () {
                $("#btnSearch").click(function () {
                    var selectedClass = $(":radio[name='kelas']:checked").val();
                    var targetFile = "";

                    if (selectedClass === "all") {
                        targetFile = "nilai.js";
                    } else if (selectedClass === "A") {
                        targetFile = "nilaiA.js";
                    } else if (selectedClass === "B") {
                        targetFile = "nilaiB.js";
                    }

                    $.getJSON(targetFile, function (data) {
                        var tbody = $("#tableBody");
                        tbody.empty();

                        $.each(data.nilai, function (index, student) {
                            var row = $("<tr>");
                            row.append($("<td>").text(student.nrp));
                            row.append($("<td>").text(student.nama));
                            row.append($("<td>").text(student.kelas));
                            row.append($("<td>").text(student.nilaiakhir));
                            tbody.append(row);
                        });

                        $("#dataTable tbody tr:odd").css("background-color", "#FFFFCC");
                        $("#dataTable tbody tr:even").css("background-color", "#CCFFAA");
                    });
                });
            });
        </script>
    </div>
</body>

</html>
