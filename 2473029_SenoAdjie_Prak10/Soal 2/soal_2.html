<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>

    <script src="jquery.js"></script>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            margin: 20px;
        }

        .form-table {
            border-collapse: collapse;
            box-shadow: 2px 2px 5px gray;
            margin-bottom: 10px;
        }

        .form-table td {
            border: 1px solid gray;
            padding: 5px;
        }

        .form-table input[type="text"] {
            width: 350px;
        }

        #resultBox {
            border: 1px solid gray;
            width: 800px;
            margin-bottom: 10px;
            display: none;
            box-shadow: 2px 2px 5px gray;
        }

        .main-title {
            text-align: center;
            margin: 15px 0;
        }

        .main-title a {
            color: blue;
            text-decoration: underline;
            font-weight: bold;
            font-size: 24px;
        }

        .item-title {
            color: blue;
            text-decoration: underline;
            font-weight: normal;
        }

        .item-container {
            padding: 15px;
        }

        .item {
            margin-bottom: 25px;
        }

        .footer {
            padding: 5px 15px;
        }

        button {
            margin-top: 10px;
            padding: 2px 10px;
        }
    </style>
</head>

<body>

    <table class="form-table" id="infoTable">
        <tr>
            <td>Title</td>
            <td><input type="text" id="inTitle" readonly></td>
        </tr>
        <tr>
            <td>Content</td>
            <td><input type="text" id="inContent" readonly></td>
        </tr>
        <tr>
            <td>Generator</td>
            <td><input type="text" id="inGenerator" readonly></td>
        </tr>
    </table>

    <div id="resultBox">
        <div class="main-title">
            <a href="#" id="mainLink">Portal S1-Sistem Informasi</a>
        </div>
        <hr style="border-top: 1px solid gray; margin:0;">
        <div class="item-container" id="itemsContainer">
        </div>
        <hr style="border-top: 1px solid gray; margin:0;">
        <div class="footer">
            &copy;<span id="footerText"></span>
        </div>
    </div>

    <button id="btnLook">Look</button>

    <script>
        $(document).ready(function () {
            $("#btnLook").click(function () {
                $.ajax({
                    url: 'SIJson.txt',
                    dataType: 'text',
                    success: function (data) {
                        var cleanData = data.trim();
                        if (cleanData.endsWith(';')) {
                            cleanData = cleanData.slice(0, -1);
                        }
                        var jsonData = JSON.parse(cleanData);

                        $("#inTitle").val(jsonData.title);
                        $("#inContent").val(jsonData.link);
                        $("#inGenerator").val(jsonData.generator);

                        $("#mainLink").text(jsonData.title).attr("href", jsonData.link);
                        $("#footerText").text(jsonData.generator);

                        var container = $("#itemsContainer");
                        container.empty();

                        $.each(jsonData.items, function (index, item) {
                            var div = $("<div class='item'></div>");

                            var titleLink = $("<a></a>").attr("href", item.link).addClass("item-title").text(item.title);
                            div.append(titleLink).append("<br>");

                            var authorLine = "By : " + item.author + " / <i>" + item.published + "</i><br><br>";
                            div.append(authorLine);

                            var desc = $("<p></p>").css({ "margin": "0", "text-align": "justify" }).html(item.description);
                            div.append(desc).append("<br>");

                            var univLine = "Universitas : <a href='" + item.universitas.m + "' style='color:blue; text-decoration:underline;'>Click Here</a><br>";
                            div.append(univLine);

                            var tagsLine = "Tag(s) : " + item.tags;
                            div.append(tagsLine);

                            container.append(div);
                        });

                        $("#resultBox").show();
                    },
                    error: function (err) {
                        alert("Error loading JSON");
                    }
                });
            });
        });
    </script>
</body>

</html>
