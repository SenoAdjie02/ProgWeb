<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>

    <style>
        table {
            margin: 20px;
        }

        .box-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 200px;
            height: 200px;
            position: relative;
            text-decoration: none;
        }

        .pinggiran {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 5px solid #FF0000;
        }

        .kiri-atas {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .kanan-atas {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }

        .kiri-bawah {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
        }

        .kanan-bawah {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        .box-link:hover .pinggiran {
            border-color: #FF00FF;
        }

        .star {
            width: 150px;
            height: 150px;
            border: none; 
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td>
                <a href="#" class="box-link">
                    <div class="pinggiran kiri-atas"></div>
                    <div class="pinggiran kanan-atas"></div>
                    <div class="pinggiran kiri-bawah"></div>
                    <div class="pinggiran kanan-bawah"></div>
                    <img src="src/src/star.jpg" class="star" alt="Star">
                </a>
            </td>
        </tr>
    </table>
</body>
</html>
