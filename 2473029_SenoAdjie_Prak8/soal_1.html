<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .menu-container {
            background-color: #ff3399;
            color: white;
            padding: 10px;
            width: max-content;
        }

        .menu-container>ol {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        .item {
            position: relative;
            cursor: pointer;
            padding: 5px;
            border: 1px solid white;
        }

        .item>ol {
            list-style-type: none;
            margin: 0;
            padding: 5px;
            background: white;
            color: black;
            border: 1px solid #ff3399;
            position: absolute;
            top: 30px;
            left: 0;
            width: max-content;
        }

        .item>ol li {
            padding: 3px 0;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $("li.item ol").hide();

            $("li.item").hover(
                function () {
                    $(this).find("ol").show();
                },
                function () {
                    $(this).find("ol").hide();
                }
            );
        });
    </script>
</head>

<body>
    <div class="menu-container">
        <ol>
            <li class="item">jQuery
                <ol>
                    <li>Download</li>
                    <li>Documentation</li>
                    <li>Blog</li>
                </ol>
            </li>
            <li class="item">Community
                <ol>
                    <li>Mailing List</li>
                    <li>Tutorials</li>
                    <li>Demos</li>
                    <li>Plugins</li>
                </ol>
            </li>
            <li class="item">Development
                <ol>
                    <li>Source Code</li>
                    <li>Bug Tracking</li>
                    <li>Recent Changes</li>
                </ol>
            </li>
        </ol>
    </div>
</body>

</html>
