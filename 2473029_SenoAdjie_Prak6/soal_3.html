<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
        }

        .wadah-input {
            margin-bottom: 15px;
        }

        .wadah-input button {
            display: block;
            margin-top: 8px;
            padding: 2px 10px;
        }

        table {
            border-collapse: collapse;
        }

        .blok-warna {
            background-color: orange;
            border: 1px solid white;
        }

        .blok-transparan {
            background-color: transparent;
        }
    </style>

    <script type="text/javascript">
        function buatPiramida() {
            var n = parseInt(document.getElementById("nilaiTinggi").value);

            if (isNaN(n) || n < 1) {
                alert("Masukkan angka lebih besar dari 0.");
                return;
            }

            var htmlTabel = "<table width='800' height='600'>";

            var maxKolom = (2 * n) - 1;
            var nilaiTengah = Math.floor(maxKolom / 2);

            for (var r = 0; r < n; r++) {
                htmlTabel += "<tr>";

                for (var c = 0; c < maxKolom; c++) {
                    if (c >= (nilaiTengah - r) && c <= (nilaiTengah + r)) {
                        htmlTabel += "<td class='blok-warna'></td>";
                    } else {
                        htmlTabel += "<td class='blok-transparan'></td>";
                    }
                }

                htmlTabel += "</tr>";
            }

            htmlTabel += "</table>";

            var areaHasil = document.getElementById("areaTampil");
            areaHasil.style.display = "inline-block";
            areaHasil.innerHTML = htmlTabel;
        }
    </script>
</head>

<body>
    <div class="wadah-input">
        Tinggi Piramida :
        <input type="number" id="nilaiTinggi" min="1">
        <button onclick="buatPiramida()">proses</button>
    </div>

    <div id="areaTampil"></div>
</body>

</html>
