<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473029-Seno Adjie Bintang Pratama</title>
</head>

<body>
    <form>
        <table style="border: 2px  solid black" width="350px">
            <tr>
                <td colspan="3">
                    <h2 style="margin:10px; align: left; vertical-align: top;">Form Tambah Data User</h2>
                </td>
            </tr>
            <tr>
                <td>Name</td>
                <td>:</td>
                <td>
                    <input type="text" name="name" required oninvalid="this.setCustomValidity('Name is required!!!')"
                        oninput="this.setCustomValidity('')">
                </td>
            </tr>

            <tr>
                <td>Address</td>
                <td>:</td>
                <td>
                    <input type="text" name="address" required
                        oninvalid="this.setCustomValidity('Address is required!!!')"
                        oninput="this.setCustomValidity('')">
                </td>
            </tr>

            <tr>
                <td>Email</td>
                <td>:</td>
                <td>
                    <input type="email" name="email" required
                        oninvalid="if(this.validity.typeMismatch) { this.setCustomValidity('Serakan \'@\' pada alamat email ini. \'' + this.value + '\''); } 
                                else if(this.validity.valueMissing) { this.setCustomValidity('Harap isi bidang ini'); }"
                        oninput="this.setCustomValidity('')">
                </td>
            </tr>

            <tr>
                <td>Home Page</td>
                <td>:</td>
                <td><input type="url" name="homepage"></td>
            </tr>

            <tr>
                <td>Birthday</td>
                <td>:</td>
                <td>
                    <input type="text" name="birthday" placeholder="hh/bb/tttt">
                </td>
            </tr>

            <tr>
                <td>Favorit Color</td>
                <td>:</td>
                <td><input type="color" name="fav_color" style="width: 50px;">
                </td>
            </tr>

            <tr>
                <td>IPK</td>
                <td>:</td>
                <td>
                    <input type="number" name="ipk" min="0" max="4" step="0.1" value="0" style="width: 60px;">
                </td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td>:</td>
                <td>
                    <input type="tel" name="phone" pattern="[0-9]{3}-[0-9]{7,10}"
                        title="Format: ###-####### hingga ###-##########" required>
                </td>
            </tr>

            <tr>
                <td></td>
                <td></td>
                <td><input type="submit" value="Add"></td>
            </tr>
        </table>
    </form>
</body>

</html>
